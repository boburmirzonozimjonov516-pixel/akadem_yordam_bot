version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: akadem_postgres
    environment:
      POSTGRES_USER: akadem
      POSTGRES_PASSWORD: akadem_password_123
      POSTGRES_DB: akadem_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akadem"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: akadem_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Telegram Bot
  bot:
    build: .
    container_name: akadem_bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_ID: ${ADMIN_ID}
      DATABASE_URL: postgresql://akadem:akadem_password_123@postgres:5432/akadem_db
      REDIS_URL: redis://redis:6379/0
      CLICK_MERCHANT_ID: ${CLICK_MERCHANT_ID}
      PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID}
      PAYME_API_KEY: ${PAYME_API_KEY}
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./documents:/app/documents
    restart: unless-stopped
    networks:
      - akadem_network

  # pgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: akadem_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@akadem.local
      PGADMIN_DEFAULT_PASSWORD: admin_password_123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - akadem_network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: akadem_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - bot
    networks:
      - akadem_network

volumes:
  postgres_data:
  redis_data:

networks:
  akadem_network:
    driver: bridge
